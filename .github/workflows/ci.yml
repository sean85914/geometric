name: Test

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest geometric/tests/ -v
  lint:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install flake8 pep8-naming
      - run: flake8 geometric/

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Build Sphinx docs
        run: |
          pip install -r requirements.txt
          pip install sphinx sphinx-rtd-theme myst-parser
          pip install -e .
          make -C docs html

      - name: Prepare simple index
        run: |
          WHEEL_NAME=$(basename dist/*.whl)

          # 從 gh-pages 抓回現有的 simple/ 目錄（保留舊版 wheel）
          git fetch origin gh-pages
          mkdir -p docs/build/html/simple/geometric
          git checkout origin/gh-pages -- simple/
          cp simple/index.html docs/build/html/simple/
          cp simple/geometric/*.whl docs/build/html/simple/geometric/ 2>/dev/null || true

          # 加入本次新 wheel
          cp dist/$WHEEL_NAME docs/build/html/simple/geometric/

          # 重新產生 simple/geometric/index.html
          {
            echo '<!DOCTYPE html>'
            echo '<html><head><title>Links for geometric</title></head>'
            echo '<body><h1>Links for geometric</h1>'
            for whl in docs/build/html/simple/geometric/*.whl; do
              name=$(basename "$whl")
              echo "<a href=\"$name\">$name</a><br>"
            done
            echo '</body></html>'
          } > docs/build/html/simple/geometric/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          keep_files: true

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl